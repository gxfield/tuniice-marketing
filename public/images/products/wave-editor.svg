<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#141414"/>
  <!-- Wave pattern - zigzag waveform -->
  <polyline
    points="20,150 60,80 100,220 140,60 180,240 220,90 260,210 300,100 340,190 380,130"
    fill="none"
    stroke="var(--color-accent-amber, #ffbf00)"
    stroke-width="6"
    stroke-linecap="square"
  />
  <polyline
    points="20,150 60,80 100,220 140,60 180,240 220,90 260,210 300,100 340,190 380,130"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linecap="square"
  />
</svg>
